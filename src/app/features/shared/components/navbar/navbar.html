<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="brand">
      <span class="brand-cross">✠</span>
      <span class="brand-name">Escravos de Maria</span>
    </a>

    <nav class="nav-links">
      <a routerLink="/blog" routerLinkActive="active" [routerLinkActiveOptions]="{exact:false}"
        >Publicações</a
      >
      <a routerLink="/forum" routerLinkActive="active">Fórum</a>
      <a routerLink="/questions" routerLinkActive="active">Dúvidas</a>
      <a routerLink="/rosario" routerLinkActive="active">Rosário</a>
    </nav>

    <div class="nav-right">
      <button
        class="theme-toggle"
        (click)="toggleTheme()"
        [title]="isDark ? 'Tema claro' : 'Tema escuro'"
      >
        {{ isDark ? '☀' : '☾' }}
      </button>

      @if (auth.isLoggedIn()) {
      <div class="user-info">
        @if (auth.currentUser()?.avatar) {
        <img
          class="user-avatar"
          [src]="getAvatarUrl(auth.currentUser()?.avatar)"
          [alt]="auth.currentUser()?.username"
        />
        } @else {
        <div class="user-avatar user-avatar--placeholder">
          {{ auth.currentUser()?.username?.charAt(0)?.toUpperCase() }}
        </div>
        }
        <span class="user-name">{{ auth.currentUser()?.username }}</span>
        <button class="btn-logout" (click)="logout()">Sair</button>
      </div>
      } @else {
      <button class="btn-login" (click)="login()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.101 18.08.118 18.1.136 18.112a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"
          />
        </svg>
        Entrar com Discord
      </button>
      }
    </div>
  </div>
</header>
