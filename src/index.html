<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8" />
	<title>Escravos de Maria</title>
	<base href="/" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="Comunidade de fiéis católicos tradicionais dedicada à formação espiritual, doutrina e vida contemplativa." />
	<meta name="theme-color" content="#f9f6ef" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="#111318" media="(prefers-color-scheme: dark)" />
	<link rel="icon" type="image/x-icon" href="favicon.ico" />

	<!-- Google Fonts: preconnect para performance -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&family=Cinzel:wght@400;500;600&display=swap"
	/>

	<!-- Inicializa tema antes do Angular para evitar flash -->
	<script>
		(function () {
			const saved = localStorage.getItem("theme");
			const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
			const theme = saved || (prefersDark ? "dark" : "light");
			document.documentElement.setAttribute("data-theme", theme);
		})();
	</script>
</head>
<body>
<app-root></app-root>
</body>
</html>
